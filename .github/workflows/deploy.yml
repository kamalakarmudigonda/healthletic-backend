name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_TAG: v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Application Test
        run: |
          python -m py_compile app.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: mudigonda
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: mudigonda/healthletic-backend:${{ env.IMAGE_TAG }}

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mudigonda/healthletic-backend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: helm lint helm/backend

      - name: Deploy using Helm
        run: |
          helm upgrade --install backend helm/backend \
            --set image.repository=mudigonda/healthletic-backend \
            --set image.tag=${{ env.IMAGE_TAG }} \
            --wait

      - name: Smoke Test
        run: |
          kubectl rollout status deployment/backend
          kubectl get pods
          kubectl get svc

      - name: Rollback on Failure
        if: failure()
        run: |
          helm rollback backend

      - name: Post Trivy Security Scan
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: mudigonda/healthletic-backend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0
