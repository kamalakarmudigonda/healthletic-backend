name: Flask CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: healthletic-backend
  IMAGE_TAG: v1.0.0

jobs:
  build-test-scan-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Application Test
        run: |
          python -m py_compile app.py

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build \
      -t ${{ secrets.DOCKER_USERNAME }}/healthletic-backend:${{ env.IMAGE_TAG }} \
      .

      - name: Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/healthletic-backend:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/healthletic-backend:${{ env.IMAGE_TAG }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Helm Lint
        run: |
          helm lint helm/backend

      - name: Deploy using Helm
        run: |
          helm upgrade --install backend helm/backend --wait

      - name: Smoke Test
        run: |
          kubectl get pods
          kubectl get svc

      - name: Rollback on Failure
        if: failure()
        run: |
          helm rollback backend
